// ============================================================================
// RELEASE CHECKLIST - read before bumping versions:
//   1. Bump versionCode AND versionName below (and in manifestPlaceholders)
//   2. Build the APK:  ./gradlew :extensions:en:<name>:assembleRelease
//   3. Copy the built APK into apk/<name>.apk (replacing the old one)
//   4. Update index.min.json at the repo root:
//        - set "code"   to the new versionCode
//        - set "version" to the new versionName
//      The app fetches index.min.json to detect updates - if the index still
//      shows the old versionCode, the update button will NOT appear even if
//      the APK on disk is newer. The index is the source of truth for the app.
//   5. Commit APK + index.min.json + build.gradle together in one commit.
// Failing to update index.min.json is the #1 cause of "update not showing".
// ============================================================================

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'org.jetbrains.kotlin.plugin.serialization'
}

android {
    namespace 'yokai.extension.novel.en.annasarchive'
    compileSdk 34

    defaultConfig {
        applicationId "yokai.extension.novel.en.annasarchive"
        minSdk 21
        targetSdk 34
        versionCode 13
        versionName "1.2.1"

        manifestPlaceholders = [
            extName: "Anna's Archive",
            extClass: ".AnnasArchiveFactory",
            extVersionCode: "13",
            extVersionName: "1.2.1",
            extNsfw: "false"
        ]
    }

    signingConfigs {
        release {
            storeFile file("${System.getProperty('user.home')}/.android/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation project(':lib:novel-extensions-lib')
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.23'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.2'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.jsoup:jsoup:1.17.2'
}

