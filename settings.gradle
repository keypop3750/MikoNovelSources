pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }
    }
}

rootProject.name = "MikoNovelSources"

include ':lib:novel-extensions-lib'

// English extensions
include ':extensions:en:royalroad'
include ':extensions:en:scribblehub'
include ':extensions:en:novelfull'
include ':extensions:en:novelsonline'
include ':extensions:en:webnovel'
include ':extensions:en:readnovelfull'

// New extensions (ported from QuickNovel)
// LibRead removed — it is just a mirror/intermediary of FreeWebNovel.
include ':extensions:en:freewebnovel'
include ':extensions:en:ranobes'

// New novel source extensions
include ':extensions:en:lightnovelpub'
include ':extensions:en:novelfire'
include ':extensions:en:novelroll'
include ':extensions:en:novelpedia'

// BoxNovel (moved from boxnovel.com → novlove.com → novelnice.com)
include ':extensions:en:boxnovel'

// Multi-language extensions
include ':extensions:en:annasarchive'
